<!DOCTYPE html>
<html>
<head>
    <title>Free Daily Deals for Freelancers</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #666;
            font-size: 16px;
            margin-bottom: 30px;
        }
        .feature {
            background: #f0f0f0;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            text-align: left;
        }
        .feature-item {
            margin: 10px 0;
            color: #555;
        }
        .feature-item:before {
            content: "✓ ";
            color: #28a745;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
            margin: 10px 0;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-weight: bold;
        }
        button:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .message {
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
            display: none;
        }
        .success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .counter {
            margin-top: 20px;
            color: #888;
            font-size: 14px;
        }
        .safety {
            margin-top: 20px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎁 Free Daily Deals</h1>
        <div class="subtitle">For freelancers & small business owners</div>

        <div class="feature">
            <div class="feature-item">Free templates every day</div>
            <div class="feature-item">Discount codes for software</div>
            <div class="feature-item">Tools to save time & money</div>
            <div class="feature-item">100% free. Unsubscribe anytime.</div>
        </div>

        <form id="signupForm">
            <input type="email" id="email" name="email" placeholder="Enter your email address" required>
            <button type="submit" id="submitBtn">Get Free Deals →</button>
        </form>

        <div id="message" class="message"></div>
        <div class="counter">📧 Join other freelancers today</div>
        <div class="safety">🔒 No spam. Unsubscribe anytime. Your email is safe.</div>
    </div>

    <script>
        // YOUR FORMSPREE ENDPOINT - REPLACED
        const FORMSPREE_URL = 'https://formspree.io/f/xkggyver';

        const form = document.getElementById('signupForm');
        const emailInput = document.getElementById('email');
        const submitBtn = document.getElementById('submitBtn');
        const messageDiv = document.getElementById('message');

        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = emailInput.value.trim().toLowerCase();

            // Basic email validation
            if (!email || !email.includes('@') || !email.includes('.')) {
                messageDiv.textContent = '❌ Please enter a valid email address.';
                messageDiv.className = 'message error';
                messageDiv.style.display = 'block';
                setTimeout(() => {
                    messageDiv.style.display = 'none';
                }, 3000);
                return;
            }

            // Disable button while submitting
            submitBtn.disabled = true;
            submitBtn.textContent = 'Subscribing...';
            messageDiv.textContent = 'Subscribing...';
            messageDiv.className = 'message';
            messageDiv.style.display = 'block';

            try {
                const response = await fetch(FORMSPREE_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({ email: email })
                });

                const data = await response.json();

                if (response.ok) {
                    messageDiv.textContent = '✅ Subscribed! Thank you! Check your email for confirmation.';
                    messageDiv.className = 'message success';
                    emailInput.value = '';
                } else {
                    messageDiv.textContent = '❌ ' + (data.error || 'Something went wrong. Please try again.');
                    messageDiv.className = 'message error';
                }
            } catch (error) {
                messageDiv.textContent = '❌ Network error. Please check your connection and try again.';
                messageDiv.className = 'message error';
            }

            // Re-enable button
            submitBtn.disabled = false;
            submitBtn.textContent = 'Get Free Deals →';

            // Hide message after 5 seconds
            setTimeout(() => {
                messageDiv.style.display = 'none';
            }, 5000);
        });
    </script>
</body>
</html>
